<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flota San Isidro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --celeste: #38bdf8;
            --texto-blanco: #f8fafc;
            --texto-gris: #94a3b8;
            --verde-inicio: #10b981;
            --naranja-fin: #f59e0b;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding-bottom: 70px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #0b1329;
            border-bottom: 1px solid #1e293b;
        }
        h1, h2, h3 { margin: 0; }
        .container { padding: 20px; }
        .vista { display: none; }
        .vista.activa { display: block; }
        
        /* Formularios y Tarjetas */
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--celeste);
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: var(--bg-principal);
            color: white;
            box-sizing: border-box;
        }
        
        /* Botones */
        .btn {
            background-color: var(--celeste);
            color: var(--bg-principal);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background-color: #ef4444; color: white; }
        
        /* Barra de Navegación Inferior */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #0b1329;
            border-top: 1px solid #1e293b;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--texto-gris);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            gap: 4px;
        }
        .nav-btn.activo { color: var(--celeste); }
        
        /* Grid de Vehículos */
        .grid-vehiculos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .card-vehiculo {
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .card-vehiculo.seleccionado {
            border-color: var(--celeste);
            background-color: #1e3a8a;
        }
    </style>
</head>
<body>

    <header>
        <h1 style="font-size: 1.3rem; font-weight: bold; color: var(--celeste);">Flota San Isidro</h1>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 0.8rem; color: #64748b; font-style: italic; letter-spacing: 0.5px;">
                Powered by <strong style="color: var(--celeste);">GabyMartin</strong>
            </span>
            
            <button id="btn-logout" style="background: none; border: none; color: var(--celeste); cursor: pointer; display: none;">
                <span class="material-icons">logout</span>
            </button>
        </div>
    </header>

    <div class="container">
        
        <section id="vista-login" class="vista activa">
            <div class="card">
                <h2 style="margin-bottom: 20px; text-align: center;">Iniciar Sesión</h2>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="******">
                </div>
                <button class="btn" id="btn-ingresar">Ingresar</button>
            </div>
        </section>

        <section id="vista-flota" class="vista">
            <h2 style="margin-bottom: 15px;">Seleccione el Vehículo</h2>
            <div id="lista-vehiculos" class="grid-vehiculos">
                </div>
        </section>

        <section id="vista-reporte" class="vista">
            <div class="card">
                <h2 id="reporte-titulo" style="margin-bottom: 15px; color: var(--celeste);">Reporte de Unidad</h2>
                
                <div class="form-group">
                    <label>Tipo de Registro</label>
                    <select id="reporte-tipo">
                        <option value="Inicio">Inicio de Jornada</option>
                        <option value="Fin">Fin de Jornada</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Kilometraje Actual</label>
                    <input type="number" id="reporte-km" placeholder="Ej: 125000">
                </div>
                
                <div class="form-group">
                    <label>Estado del Combustible</label>
                    <select id="reporte-combustible">
                        <option value="Lleno">Lleno</option>
                        <option value="3/4">3/4</option>
                        <option value="1/2">1/2</option>
                        <option value="1/4">1/4</option>
                        <option value="Reserva">Reserva</option>
                    </select>
                </div>

                <div class="form-group" style="border: 1px dashed #334155; padding: 15px; border-radius: 8px; margin-top: 15px; background-color: #152238;">
                    <label style="color: var(--naranja-fin); font-weight: bold; display: flex; align-items: center; gap: 6px;">
                        <span class="material-icons" style="font-size: 1.1rem;">local_gas_station</span> ¿Cargó Combustible? (Opcional)
                    </label>
                    
                    <div class="form-group" style="margin-top: 10px;">
                        <label style="color: var(--texto-gris);">Foto del Ticket / Comprobante</label>
                        <input type="file" id="reporte-ticket-combustible" accept="image/*" style="padding: 5px;">
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="color: var(--texto-gris);">Monto Total Gastado ($ ARS)</label>
                        <input type="number" id="reporte-monto-combustible" placeholder="Ej: 35000">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Fotos del Perímetro / Inspección</label>
                    <input type="file" id="reporte-fotos" multiple accept="image/*" style="padding: 5px;">
                </div>
                
                <div class="form-group">
                    <label>Novedades o Daños (Opcional)</label>
                    <textarea id="reporte-novedades" rows="3" placeholder="Detalle si encuentra rayas, golpes o fallas..."></textarea>
                </div>

                <button class="btn" id="btn-enviar-reporte">Enviar Reporte</button>
            </div>
        </section>

        <section id="vista-admin" class="vista">
            <div class="card">
                <h2 style="margin-bottom: 15px; color: var(--celeste);">Agregar Nuevo Vehículo</h2>
                <div class="form-group">
                    <label>Patente / Dominio</label>
                    <input type="text" id="admin-patente" placeholder="ABC-123 o AE-123-BB">
                </div>
                <div class="form-group">
                    <label>Modelo / Descripción</label>
                    <input type="text" id="admin-modelo" placeholder="Ej: Toyota Hilux 2024">
                </div>
                <button class="btn" id="btn-agregar-vehiculo">Guardar Vehículo</button>
            </div>

            <div class="card" style="background-color: #1a233a;">
                <h3 style="color: var(--celeste); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                    <span class="material-icons">assignment</span> Historial de Jornadas y Reportes
                </h3>
                <div id="lista-reportes-admin" style="display: flex; flex-direction: column; gap: 15px;">
                    <p style="color: var(--texto-gris); font-style: italic;">Cargando reportes de la flota...</p>
                </div>
            </div>
        </section>

    </div>

    <nav id="menu-navegacion" style="display: none;">
        <button class="nav-btn activo" onclick="cambiarVista('vista-flota')">
            <span class="material-icons">directions_car</span>Flota
        </button>
        <button class="nav-btn" id="btn-nav-admin" onclick="cambiarVista('vista-admin')" style="display: none;">
            <span class="material-icons">admin_panel_settings</span>Admin
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
